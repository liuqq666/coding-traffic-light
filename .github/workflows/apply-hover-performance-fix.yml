name: Apply hover performance fix

on:
  push:
    branches:
      - agent/fix-hover-loading
    paths:
      - .github/workflows/apply-hover-performance-fix.yml

permissions:
  contents: write

jobs:
  apply-and-build:
    if: github.event.head_commit.message == 'Apply hover performance fix'
    runs-on: macos-14
    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-hover-loading

      - name: Apply guarded source patch
        run: python3 scripts/apply_hover_performance_fix.py

      - name: Check whitespace
        run: git diff --check

      - name: Build native macOS app
        run: ./scripts/build.command

      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Sources/CodexStatusLight.swift
          git diff --cached --quiet && { echo "Expected a source change, but the patch was empty."; exit 1; }
          git commit -m "Fix hover-induced main-thread loading"
          git push origin HEAD:agent/fix-hover-loading
